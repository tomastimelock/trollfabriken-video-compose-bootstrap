<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Arial', 'Helvetica Neue', sans-serif; overflow: hidden; }
  .stat { text-align: center; animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes pop-in { from { opacity:0; transform:scale(0.7); } to { opacity:1; transform:scale(1); } }
  .number { font-size: {{number_size|default:120px}}; font-weight: 900; color: {{accent|default:#f7c948}}; letter-spacing: -3px; line-height: 1; text-shadow: 0 0 60px {{glow|default:rgba(247,201,72,0.4)}}; }
  .label { font-size: {{label_size|default:28px}}; font-weight: 500; color: {{text_color|default:rgba(255,255,255,0.85)}}; margin-top: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .prefix { font-size: {{prefix_size|default:48px}}; font-weight: 900; color: {{accent|default:#f7c948}}; vertical-align: super; line-height: 1; }
  .suffix { font-size: {{suffix_size|default:48px}}; font-weight: 900; color: {{accent|default:#f7c948}}; vertical-align: super; line-height: 1; }
</style>
</head>
<body>
<div class="stat">
  <div class="number"><span class="prefix">{{prefix|default:}}</span>{{number|default:42}}<span class="suffix">{{suffix|default:}}</span></div>
  <div class="label">{{label|default:Key Metric}}</div>
</div>
</body>
</html>
