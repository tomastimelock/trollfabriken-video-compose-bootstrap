<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 100vw; height: 100vh; display: flex; align-items: {{v_align|default:center}}; justify-content: {{h_align|default:center}}; font-family: 'Arial', 'Helvetica Neue', sans-serif; overflow: hidden; }
  .badge {
    display: inline-block;
    background: {{bg_color|default:#e53935}};
    color: {{text_color|default:#ffffff}};
    font-size: {{font_size|default:22px}};
    font-weight: 700;
    letter-spacing: {{letter_spacing|default:0.5px}};
    padding: {{padding|default:10px 22px}};
    border-radius: {{border_radius|default:40px}};
    text-transform: {{transform|default:none}};
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    animation: pop-in 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pop-in { from { opacity:0; transform:scale(0.6); } to { opacity:1; transform:scale(1); } }
</style>
</head>
<body>
<div class="badge">{{text|default:NEW}}</div>
</body>
</html>
