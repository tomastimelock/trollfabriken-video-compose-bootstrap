<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Arial', 'Helvetica Neue', sans-serif; }
  .wrap { position: fixed; bottom: 7%; left: 5%; right: 5%; animation: slide-up 0.4s cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes slide-up { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  .bar { height: 3px; background: {{accent|default:#ff6b35}}; width: 0; animation: grow 0.35s 0.1s ease-out forwards; border-radius: 2px; margin-bottom: 10px; }
  @keyframes grow { to { width: {{bar_width|default:120px}}; } }
  .name { font-size: {{name_size|default:52px}}; font-weight: 800; color: {{text_color|default:#ffffff}}; letter-spacing: -0.5px; line-height: 1.1; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
  .title { font-size: {{title_size|default:28px}}; font-weight: 400; color: {{accent|default:#ff6b35}}; margin-top: 4px; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"></div>
  <div class="name">{{name|default:Full Name}}</div>
  <div class="title">{{title|default:Title / Organisation}}</div>
</div>
</body>
</html>
